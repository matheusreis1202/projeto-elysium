<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Uma experiência visual imersiva com aves voando em um céu deslumbrante">
    <title>Aves Voando — Experiência Visual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sky">
        <!-- Sun/Moon -->
        <div id="celestial-body"></div>

        <!-- Cloud layers -->
        <div id="clouds-far" class="cloud-layer"></div>
        <div id="clouds-mid" class="cloud-layer"></div>
        <div id="clouds-near" class="cloud-layer"></div>

        <!-- Bird canvas -->
        <canvas id="bird-canvas"></canvas>

        <!-- Overlay UI -->
        <div id="overlay">
            <h1 id="title">Aves Voando</h1>
            <p id="subtitle">Observe o voo livre</p>
        </div>

        <!-- Time control -->
        <div id="time-control">
            <label for="time-slider" id="time-label">Hora do dia</label>
            <input type="range" id="time-slider" min="0" max="100" value="35">
        </div>

        <!-- Bird count -->
        <div id="bird-control">
            <label for="bird-slider" id="bird-label">Aves: <span id="bird-count">25</span></label>
            <input type="range" id="bird-slider" min="5" max="80" value="25">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
